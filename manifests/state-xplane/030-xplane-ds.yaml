apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xplane-ds
  namespace: {{ .Namespace }}
  labels:
    tier: node
    app: xplane
    name: xplane
spec:
  selector:
    matchLabels:
      name: xplane
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: xplane
        name: xplane
    spec:
      terminationGracePeriodSeconds: 10
      {{- if .ImagePullSecrets }}
      imagePullSecrets:
      {{- range .ImagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: false
      hostNetwork: true
      containers:
        - name: xplane
          image: {{ .Image }}
          resources:
            requests:
              cpu: "100m"
              memory: "50Mi"
            limits:
              cpu: "300m"
              memory: "150Mi"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - "NET_RAW"
              drop:
                - "ALL"
          volumeMounts:
            - name: proc
              mountPath: /proc
            - name: sys
              mountPath: /sys
            - name: ovs
              mountPath: /var/run/openvswitch/
            - name: ovs-systemd-config
              mountPath: /etc/default/openvswitch-switch
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: ovs
          hostPath:
            path: /var/run/openvswitch
        - name: ovs-systemd-config
          hostPath:
            path: /etc/default/openvswitch-switch
            type: FileOrCreate
